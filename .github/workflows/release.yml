name: Release

# Builds native installers for every OS on their own runner (macOS installers
# can't be produced on Windows/Linux). Push a v* tag to publish a GitHub Release
# with all artifacts attached, or run manually to just build and upload them.
permissions:
  contents: write

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: rustup target add wasm32-unknown-unknown

      - run: npm install --no-audit --no-fund

      # Asset filenames come from package.json "version" — sync it from the tag
      # so v0.2.2 never ships files named 0.2.0 again.
      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: npm version ${GITHUB_REF_NAME#v} --no-git-tag-version --allow-same-version --workspaces --include-workspace-root
        shell: bash

      # electron-builder targets the runner's OS (see per-platform targets in
      # package.json "build"). No signing certs in CI -> unsigned artifacts.
      # --publish never lives in each app's build script: passing it here via
      # `npm run build -- --publish never` leaks the extra args into every
      # workspace script (packages got a literal `tsc never`).
      - name: Build
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v5
        with:
          name: sidecamp-suite-${{ matrix.os }}
          path: |
            apps/*/release/*.exe
            apps/*/release/*.dmg
            apps/*/release/*.zip
            apps/*/release/*.AppImage
            apps/*/release/*.deb
          if-no-files-found: ignore

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/*/release/*.exe
            apps/*/release/*.dmg
            apps/*/release/*.zip
            apps/*/release/*.AppImage
            apps/*/release/*.deb
