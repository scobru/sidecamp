name: Release

# Builds native installers for every OS on their own runner (macOS installers
# can't be produced on Windows/Linux). sidecamp and graphofone version and
# release independently — push a `sidecamp-vX.Y.Z` or `graphofone-vX.Y.Z` tag
# to build and publish only that app, or run manually to build both without publishing.
permissions:
  contents: write

on:
  push:
    tags: ['sidecamp-v*', 'graphofone-v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        app: [sidecamp, graphofone]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: rustup target add wasm32-unknown-unknown

      - run: npm install --no-audit --no-fund

      # Only build/publish the app whose tag prefix matches this job's matrix.app.
      - name: Check tag matches this app
        id: gate
        run: |
          if [[ "$GITHUB_REF_NAME" != "${{ matrix.app }}-v"* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      # Asset filenames come from package.json "version" — sync it from the tag
      # so sidecamp-v0.2.2 never ships files named 0.2.0 again. Only this app's
      # workspace is touched: sidecamp and graphofone version independently.
      - name: Sync version from tag
        if: steps.gate.outputs.skip == 'false'
        run: npm version ${GITHUB_REF_NAME#${{ matrix.app }}-v} --no-git-tag-version --allow-same-version --workspace apps/${{ matrix.app }}
        shell: bash

      # electron-builder targets the runner's OS (see per-platform targets in
      # package.json "build"). No signing certs in CI -> unsigned artifacts.
      # --publish never lives in each app's build script: passing it here via
      # `npm run build -- --publish never` leaks the extra args into every
      # workspace script (packages got a literal `tsc never`).
      - name: Build
        if: steps.gate.outputs.skip == 'false' || github.event_name == 'workflow_dispatch'
        run: npm run build --workspace apps/${{ matrix.app }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v5
        if: steps.gate.outputs.skip == 'false' || github.event_name == 'workflow_dispatch'
        with:
          name: ${{ matrix.app }}-${{ matrix.os }}
          path: |
            apps/${{ matrix.app }}/release/*.exe
            apps/${{ matrix.app }}/release/*.dmg
            apps/${{ matrix.app }}/release/*.zip
            apps/${{ matrix.app }}/release/*.AppImage
            apps/${{ matrix.app }}/release/*.deb
          if-no-files-found: ignore

      - name: Attach to GitHub Release
        if: steps.gate.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/${{ matrix.app }}/release/*.exe
            apps/${{ matrix.app }}/release/*.dmg
            apps/${{ matrix.app }}/release/*.zip
            apps/${{ matrix.app }}/release/*.AppImage
            apps/${{ matrix.app }}/release/*.deb

  android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [sidecamp]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - run: npm install --no-audit --no-fund

      - name: Check tag matches this app
        id: gate
        run: |
          if [[ "$GITHUB_REF_NAME" != "${{ matrix.app }}-v"* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Sync version from tag
        if: steps.gate.outputs.skip == 'false'
        run: npm version ${GITHUB_REF_NAME#${{ matrix.app }}-v} --no-git-tag-version --allow-same-version --workspace apps/${{ matrix.app }}
        shell: bash

      - name: Build Web Assets
        if: steps.gate.outputs.skip == 'false' || github.event_name == 'workflow_dispatch'
        run: npm run build --workspace apps/${{ matrix.app }}

      - name: Capacitor Sync
        if: steps.gate.outputs.skip == 'false' || github.event_name == 'workflow_dispatch'
        run: npx cap sync android
        working-directory: apps/${{ matrix.app }}

      - name: Build APK
        if: steps.gate.outputs.skip == 'false' || github.event_name == 'workflow_dispatch'
        run: ./gradlew assembleRelease
        working-directory: apps/${{ matrix.app }}/android

      - name: Attach APK to GitHub Release
        if: steps.gate.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          files: apps/${{ matrix.app }}/android/app/build/outputs/apk/release/app-release-unsigned.apk
